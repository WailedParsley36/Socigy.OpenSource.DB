name: CI

on:
  push:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Configure test database connection
        run: |
          echo '{
            "ConnectionStrings": {
              "TestDb": {
                "Default": "Host=localhost;Port=5432;Username=postgres;Password=1234;Database=postgres;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=20;Connection Idle Lifetime=15;Include Error Detail=true"
              }
            }
          }' > UnitTest.DB.Tests/appsettings.json

      - name: Restore
        run: dotnet restore UnitTest.DB.Tests/UnitTest.DB.Tests.csproj

      - name: Test
        run: dotnet test UnitTest.DB.Tests/UnitTest.DB.Tests.csproj --no-restore --verbosity normal

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Check version change
        id: version_check
        run: |
          CURRENT=$(grep -oP '(?<=<PackageVersion>)[^<]+' Socigy.OpenSource.DB/Socigy.OpenSource.DB.csproj)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

          PREV=$(git show HEAD~1:Socigy.OpenSource.DB/Socigy.OpenSource.DB.csproj 2>/dev/null \
            | grep -oP '(?<=<PackageVersion>)[^<]+' || echo "")

          if [ "$CURRENT" != "$PREV" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREV -> $CURRENT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT), skipping publish"
          fi

      - name: Pack
        if: steps.version_check.outputs.should_publish == 'true'
        run: dotnet pack Socigy.OpenSource.DB/Socigy.OpenSource.DB.csproj -c Release --output ./nupkgs

      - name: Publish to NuGet
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
