name: CI

on:
  push:
    branches: ["**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Configure test database connection
        run: |
          echo '{
            "ConnectionStrings": {
              "TestDb": {
                "Default": "Host=localhost;Port=5432;Username=postgres;Password=1234;Database=postgres;Pooling=true;Minimum Pool Size=1;Maximum Pool Size=20;Connection Idle Lifetime=15;Include Error Detail=true"
              }
            }
          }' > UnitTest.DB.Tests/appsettings.json

      - name: Restore
        run: dotnet restore UnitTest.DB.Tests/UnitTest.DB.Tests.csproj

      - name: Test
        run: dotnet test UnitTest.DB.Tests/UnitTest.DB.Tests.csproj --no-restore --verbosity normal

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Check version change
        id: version_check
        run: |
          CURRENT=$(grep -oP '(?<=<PackageVersion>)[^<]+' Socigy.OpenSource.DB/Socigy.OpenSource.DB.csproj)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

          # Check if this version already exists on nuget.org
          PUBLISHED=$(curl -sf "https://api.nuget.org/v3-flatcontainer/socigy.opensource.db/index.json" \
            | grep -o "\"$CURRENT\"" || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT already published on nuget.org, skipping"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "Version $CURRENT not found on nuget.org — will publish"

      - name: Restore
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          dotnet restore Socigy.OpenSource.DB.Tool/Socigy.OpenSource.DB.Tool.csproj
          dotnet restore Socigy.OpenSource.DB/Socigy.OpenSource.DB.csproj

      - name: Pack
        if: steps.version_check.outputs.should_publish == 'true'
        run: dotnet pack Socigy.OpenSource.DB/Socigy.OpenSource.DB.csproj -c Release --output ./nupkgs --no-restore

      - name: Publish to NuGet
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./nupkgs/*.nupkg \
            --source github \
            --skip-duplicate
